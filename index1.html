<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ইমেজ সেকশনকে অর্ধেক উচ্চতা দেওয়ার জন্য */
        .top-half {
            height: 50vh;
            object-fit: cover;
        }
        .bottom-half {
            height: 50vh;
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col h-screen">

    <div class="w-full top-half overflow-hidden">
        <img src="https://via.placeholder.com/800x600" 
             alt="Profile Photo" 
             class="w-full h-full object-cover">
    </div>

    <div class="w-full bottom-half p-6 bg-white rounded-t-3xl -mt-8 shadow-2xl flex flex-col">
        <h2 class="text-xl font-bold text-gray-800 mb-4 text-center">সরাসরি ইমেইল পাঠান</h2>
        
        <div class="flex-grow flex flex-col space-y-4">
            <div>
                <label class="text-sm text-gray-500 ml-1">To:</label>
                <input type="text" value="আপনার_জিমেইল_এখানে_দিন@gmail.com" readonly 
                       class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-600 outline-none">
            </div>

            <textarea id="userMessage" placeholder="আপনার মেসেজ এখানে লিখুন..." 
                      class="w-full flex-grow p-4 border-2 border-blue-100 rounded-2xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all resize-none"></textarea>

            <button onclick="sendEmail()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-2">
                <span>Send via Gmail</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        function sendEmail() {
            const email = "আপনার_জিমেইল_এখানে_দিন@gmail.com"; // এখানে আপনার আসল জিমেইল দিন
            const message = document.getElementById('userMessage').value;
            const subject = "Website Contact Message";

            if (message.trim() === "") {
                alert("দয়া করে কিছু লিখুন!");
                return;
            }

            // Gmail-এর জন্য সরাসরি লিঙ্ক তৈরি (Mailto Protocol)
            const mailtoLink = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message)}`;
            
            // নতুন উইন্ডোতে জিমেইল ওপেন হবে
            window.location.href = mailtoLink;
        }
    </script>

</body>
</html>
