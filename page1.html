<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ইমেজ সেকশনকে অর্ধেক উচ্চতা দেওয়ার জন্য */
        .top-half {
            height: 50vh;
        }
        .bottom-half {
            height: 50vh;
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col h-screen overflow-hidden">

    <div class="w-full top-half">
        <img src="আপনার_ফটোর_লিঙ্ক_এখানে_দিন" 
             alt="Profile Photo" 
             class="w-full h-full object-cover shadow-lg">
    </div>

    <div class="w-full bottom-half p-6 bg-white rounded-t-[40px] -mt-10 shadow-2xl flex flex-col z-10">
        <div class="w-12 h-1 bg-gray-300 rounded-full mx-auto mb-6"></div>
        
        <div class="flex-grow flex flex-col space-y-4">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase ml-1">To:</label>
                <div class="w-full p-3 bg-blue-50 border border-blue-100 rounded-xl text-blue-700 font-medium">
                    Priyaakter200302@gmail.com
                </div>
            </div>

            <div class="flex-grow flex flex-col">
                <label class="text-xs font-bold text-gray-400 uppercase ml-1">Message:</label>
                <textarea id="userMessage" 
                          class="w-full flex-grow p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all resize-none text-gray-800">Hi ,, কেমন আছেন .</textarea>
            </div>

            <button onclick="sendEmail()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-xl">
                Send
            </button>
        </div>
    </div>

    <script>
        function sendEmail() {
            const email = "Priyaakter200302@gmail.com";
            const message = document.getElementById('userMessage').value;
            const subject = "Contact from Website";

            // Gmail ওপেন করার লিঙ্ক
            const mailtoLink = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message)}`;
            
            // ইমেইল অ্যাপে নিয়ে যাবে
            window.location.href = mailtoLink;
        }
    </script>

</body>
</html>
