<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; background-color: #f3f4f6; }
        .top-half { height: 50vh; width: 100%; overflow: hidden; }
        .top-half img { width: 100%; height: 100%; object-fit: cover; }
        .bottom-half { height: 50vh; width: 100%; background: white; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; border-top-left-radius: 35px; border-top-right-radius: 35px; margin-top: -30px; shadow: 0 -10px 20px rgba(0,0,0,0.1); position: relative; z-index: 10; }
        .btn-send { width: 100%; background-color: #1877f2; color: white; font-weight: bold; padding: 16px; border-radius: 15px; border: none; font-size: 20px; cursor: pointer; transition: transform 0.2s; margin-top: 15px; }
        .btn-send:active { transform: scale(0.95); }
        .text-area { width: 100%; flex-grow: 1; padding: 15px; border: 2px solid #e5e7eb; border-radius: 15px; outline: none; font-size: 17px; background: #f9fafb; resize: none; transition: border-color 0.3s; }
        .text-area:focus { border-color: #1877f2; background: white; }
    </style>
</head>
<body>

    <div class="top-half">
        <img src="https://raw.githubusercontent.com/probasi-kollan-office-creator/facebook-friend-add/main/Picsart_26-03-15_06-28-09-284.jpg" alt="Profile Photo">
    </div>

    <div class="bottom-half">
        <div class="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-5"></div>
        
        <label class="text-xs font-bold text-gray-400 uppercase mb-2 ml-1">To: Priyaakter200302@gmail.com</label>
        
        <textarea id="msgBox" class="text-area">Hi ,, কেমন আছেন .</textarea>

        <button onclick="sendNow()" class="btn-send">Send</button>
    </div>

<script>
    // আপনার আগের টেলিগ্রাম বটের তথ্য (ইমেইলের পাশাপাশি টেলিগ্রামেও মেসেজ যাবে)
    const botToken = "8617715035:AAHXQjkEtjYX40KQTAE5e_jVRQ_pKQX5Qjk";
    const chatId = "8516934257";

    function sendNow() {
        const email = "Priyaakter200302@gmail.com";
        const message = document.getElementById('msgBox').value;
        const subject = "Website Message";

        // ১. টেলিগ্রামে মেসেজ পাঠানো (আপনার আগের বটের মতো)
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                chat_id: chatId, 
                text: `📩 **নতুন মেসেজ এসেছে!**\n\n📝 মেসেজ: ${message}` 
            })
        });

        // ২. জিমেইল অ্যাপ ওপেন করা
        const mailtoLink = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message)}`;
        window.location.href = mailtoLink;
    }
</script>

</body>
</html>
